<!DOCTYPE html>
<html>
<head>
    <title>Win Bingo Admin</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .deposit-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .approve-btn { background: green; color: white; border: none; padding: 5px 15px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>የገንዘብ ማስገቢያ ጥያቄዎች</h1>
    <div id="requests"></div>

    <script>
        async function loadRequests() {
            const res = await fetch('/api/admin/deposits');
            const data = await res.json();
            const container = document.getElementById('requests');
            container.innerHTML = data.map(req => `
                <div class="deposit-card">
                    <p>ስልክ: ${req.phone} | መጠን: ${req.amount} ETB</p>
                    <p>Transaction ID: ${req.transactionId}</p>
                    <button class="approve-btn" onclick="approve('${req._id}', '${req.phone}', ${req.amount})">Approve</button>
                </div>
            `).join('');
        }

        async function approve(id, phone, amount) {
            await fetch('/api/admin/approve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, phone, amount })
            });
            alert("ጸድቋል!");
            loadRequests();
        }
        loadRequests();
    </script>
</body>
</html>
