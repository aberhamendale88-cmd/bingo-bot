kind = "web"
previewPath = "/"
title = "Win Bingo"
version = "1.0.0"
id = "artifacts/win-bingo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22560

[services.development]
run = "pnpm --filter @workspace/win-bingo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/win-bingo", "run", "build" ]
publicDir = "artifacts/win-bingo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22560"
BASE_PATH = "/"
